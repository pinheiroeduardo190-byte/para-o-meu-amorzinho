<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Taina ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animação inicial do nome */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 3s ease-in-out 2s forwards;
        }

        #intro h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Tela do botão */
        #button-screen {
            display: none;
            text-align: center;
            position: relative;
            animation: appear 1s ease-in-out;
        }

        #button-screen.active {
            display: block;
        }

        @keyframes appear {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Corações flutuantes */
        .heart {
            position: absolute;
            font-size: 2rem;
            color: #ff6b9d;
            animation: float 6s infinite ease-in-out;
            opacity: 0.7;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* Botão pergaminho */
        #open-btn {
            background: linear-gradient(180deg, #f4e4c1 0%, #e8d4a0 100%);
            border: 3px solid #8b7355;
            padding: 30px 60px;
            font-size: 1.8rem;
            font-family: 'Georgia', serif;
            color: #5c4033;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        #open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        #open-btn::before {
            content: '📜';
            position: absolute;
            left: 20px;
            font-size: 2rem;
        }

        /* Livro de mensagens */
        #message-book {
            display: none;
            perspective: 1500px;
            width: 90%;
            max-width: 700px;
            position: relative;
            z-index: 10;
        }

        #message-book.active {
            display: block;
        }

        /* Corações flutuantes no fundo */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 107, 157, 0.6);
            animation: floatUp 8s linear;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .page {
            background: #fffef7;
            padding: 60px 50px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-height: 400px;
            position: relative;
            border: 2px solid #d4c5a9;
            animation: pageFlip 0.8s ease-in-out;
        }

        @keyframes pageFlip {
            0% {
                transform: rotateY(-90deg);
                opacity: 0;
            }

            100% {
                transform: rotateY(0);
                opacity: 1;
            }
        }

        .page p {
            font-size: 1.5rem;
            line-height: 2;
            color: #3e2723;
            text-align: center;
            margin-top: 80px;
        }

        #next-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            transition: all 0.3s;
        }

        #next-btn:hover {
            background: #ff4081;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }

        @media (max-width: 768px) {
            #intro h1 {
                font-size: 2.5rem;
            }

            #open-btn {
                font-size: 1.3rem;
                padding: 20px 40px;
            }

            .page p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Tela inicial com nome -->
    <div id="intro">
        <h1>PARA TAINA</h1>
    </div>

    <!-- Tela do botão com corações -->
    <div id="button-screen">
        <button id="open-btn" type="button">Abrir Mensagem</button>
    </div>

    <!-- Livro de mensagens -->
    <div id="message-book">
        <div class="page">
            <p id="message-text"></p>
            <button id="next-btn" type="button">Próximo ❤️</button>
        </div>
    </div>

    <!-- Container para corações flutuantes -->
    <div id="hearts-container"></div>

    <script>
        const messages = [
            "Você é a pessoa a quem dedico isso, a minha namorada, o meu amor, e quem eu quero me casar...",
            "Você é a mulher que eu amo, que dedico o meu tempo, que por meio dessas mensagens você possa entender a profundidade do que sinto por você",
            "Quero que tenha em mente, sei o quanto você é uma mulher esforçada em tudo o que faz, e é por isso que eu te amo cada vez mais e mais",
            "Não só por que é dia das mulheres lhe fiz isso, mas faço também por admiração a você, carinho e amor...",
            "Você é a mulher mais linda que eu tenho em minha vida... mais carinhosa, mais fofa, mais cheirosa, e divertida, você é com quem quero passar todo esse viver. Estar perto de você me motiva a ser melhor todos os dias, isso não seria nem 1% do que você representa para mim...",
            "Eu te amo Taina... ❤️"
        ];

        let currentMessage = 0;

        // Criar corações flutuantes
        function createHearts() {
            const buttonScreen = document.getElementById('button-screen');
            const positions = [
                { top: '10%', left: '10%', delay: '0s' },
                { top: '20%', left: '80%', delay: '1s' },
                { top: '70%', left: '15%', delay: '2s' },
                { top: '60%', left: '85%', delay: '0.5s' },
                { top: '30%', left: '5%', delay: '1.5s' },
                { top: '80%', left: '90%', delay: '2.5s' },
                { top: '15%', left: '50%', delay: '1s' },
                { top: '75%', left: '50%', delay: '2s' }
            ];

            positions.forEach(pos => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.top = pos.top;
                heart.style.left = pos.left;
                heart.style.animationDelay = pos.delay;
                buttonScreen.appendChild(heart);
            });
        }

        // Mostrar tela do botão após intro
        setTimeout(() => {
            document.getElementById('button-screen').classList.add('active');
            createHearts();
        }, 5000);

        // Criar corações flutuantes no fundo
        function createFloatingHearts() {
            const container = document.getElementById('hearts-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
                heart.style.fontSize = (Math.random() * 1 + 1) + 'rem';
                container.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 10000);
            }, 800);
        }

        // Abrir mensagem
        document.getElementById('open-btn').addEventListener('click', () => {
            document.getElementById('button-screen').style.display = 'none';
            document.getElementById('message-book').classList.add('active');
            createFloatingHearts();
            showMessage();
        });

        // Mostrar mensagem atual
        function showMessage() {
            const messageText = document.getElementById('message-text');
            const nextBtn = document.getElementById('next-btn');

            messageText.textContent = messages[currentMessage];

            if (currentMessage === messages.length - 1) {
                nextBtn.style.display = 'none';
            }
        }

        // Próxima mensagem
        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentMessage < messages.length - 1) {
                currentMessage++;
                const page = document.querySelector('.page');
                page.style.animation = 'none';
                setTimeout(() => {
                    page.style.animation = 'pageFlip 0.8s ease-in-out';
                    showMessage();
                }, 10);
            }
        });
    </script>
</body>

</html>
